# StampFly Bridge Parameters
# ブリッジパラメータ設定

stampfly_bridge:
  ros__parameters:
    # WebSocket connection
    # WebSocket接続設定
    host: "192.168.4.1"
    port: 80
    path: "/ws"

    # Connection behavior
    # 接続動作
    auto_reconnect: true

    # Frame IDs
    # フレームID
    publish_tf: true
    odom_frame: "odom"
    base_frame: "base_link"
    imu_frame: "imu_link"
